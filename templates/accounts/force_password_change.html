{% extends "base.html" %}
{% block title %}Set a new password{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="card">
      <h1>Set your new password</h1>
      <p class="muted">You're using a temporary password. Choose your own to continue.</p>
      <form method="post" novalidate>
        {% csrf_token %}
        {% include "partials/form.html" with form=form %}
        <button type="submit" class="btn btn-primary btn-block">Save new password</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
