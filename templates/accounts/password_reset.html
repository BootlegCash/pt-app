{% extends "base.html" %}
{% block title %}Reset password{% endblock %}
{% block content_public %}
<div class="auth-page"><div class="auth-card"><div class="card">
  <h1>Reset password</h1>
  <p class="muted">Enter your account email. If it exists, you'll receive a reset link.</p>
  <form method="post" novalidate>
    {% csrf_token %}
    {% include "partials/form.html" with form=form %}
    <button type="submit" class="btn btn-primary btn-block">Send reset link</button>
  </form>
  <p class="mt-1"><a href="{% url 'accounts:login' %}">Back to login</a></p>
</div></div></div>
{% endblock %}
