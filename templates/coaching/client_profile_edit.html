{% extends "base.html" %}
{% block title %}Edit profile — {{ client.display_label }}{% endblock %}
{% block content %}
<div class="page-head">
  <div><h1>Edit profile</h1><span class="muted">{{ client.display_label }} — changes are audited</span></div>
  <a class="btn btn-sm" href="{% url 'coaching:client_detail' client.uuid %}">← Client</a>
</div>
<div class="card">
  <form method="post" enctype="multipart/form-data" novalidate>
    {% csrf_token %}
    {% include "partials/form.html" with form=form %}
    <button type="submit" class="btn btn-primary">Save profile</button>
  </form>
</div>
{% endblock %}
