{% extends "base.html" %}
{% block title %}Choose worksheet{% endblock %}
{% block content %}
<div class="page-head"><h1>Choose worksheet</h1>
  <span class="muted">{{ job.original_filename }}</span></div>
<div class="card">
  <form method="post">
    {% csrf_token %}
    <div class="form-row">
      <label for="sheet">Worksheet</label>
      <select id="sheet" name="sheet">
        {% for sheet in sheets %}<option value="{{ sheet }}" {% if job.selected_sheet == sheet %}selected{% endif %}>{{ sheet }}</option>{% endfor %}
      </select>
    </div>
    <button type="submit" class="btn btn-primary">Next: map columns →</button>
    <a class="btn" href="{% url 'imports:my_files' %}">Cancel</a>
  </form>
</div>
{% endblock %}
