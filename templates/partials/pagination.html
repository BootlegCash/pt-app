{% if page_obj and page_obj.paginator.num_pages > 1 %}
<nav class="row mt-1" aria-label="Parsed rows pages">
  {% if page_obj.has_previous %}
    <a class="btn btn-sm" href="?page={{ page_obj.previous_page_number }}">← Previous</a>
  {% endif %}
  <span class="muted">Page {{ page_obj.number }} of {{ page_obj.paginator.num_pages }}</span>
  {% if page_obj.has_next %}
    <a class="btn btn-sm" href="?page={{ page_obj.next_page_number }}">Next →</a>
  {% endif %}
</nav>
{% endif %}
