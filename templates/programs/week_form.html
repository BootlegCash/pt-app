{% extends "base.html" %}
{% block title %}Edit week{% endblock %}
{% block content %}
<div class="page-head"><h1>Week {{ week.week_number }} — {{ week.program.name }}</h1></div>
<div class="card">
  <form method="post" novalidate>
    {% csrf_token %}
    {% include "partials/form.html" with form=form %}
    <button type="submit" class="btn btn-primary">Save week</button>
    <a class="btn" href="{% url 'programs:builder_detail' week.program.uuid %}">Cancel</a>
  </form>
</div>
{% endblock %}
